<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Book #1</button>
    <button id="mem2-button">Book #2</button>
    <button id="mem3-button">Book #3</button>
    <h1>My Top 3 Books of <span>This Year</span></h1>
    <ol>
      <li>
        <h3 id="mem1">Book #1 : The Count of Monte Cristo by Alexandre Dumas</h3>
        <p> </p>
        <img class="Book1" src="https://s3.amazonaws.com/nightjarprod/content/uploads/sites/309/2025/06/10113726/sAT1P3FGhtJ68anUyJScnMu8t1l-scaled.jpg" width="200">
      </li>

      <li>
        <h3 id="mem2">Book #2 : The House by the Ceurelan Sea</h3>
        <p> </p>
        <img class="Book2" src="https://m.media-amazon.com/images/I/81MnY8Q7OLL._AC_UF1000,1000_QL80_.jpg" width="200">
      </li>

      <li>
        <h3 id="mem3">Book #3 : Dark Matter by Blake Crouch</h3>
        <p></p>
        <img id="Book3" src="https://prodimage.images-bn.com/pimages/9781101904244_p0_v5_s600x595.jpg" width="200">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $(".Book1").hide();
      $(".Book2").hide();
      $("#Book3").hide();


      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
        $(".Book1").show(2000)
        $("html").css("background-color","rgb(255, 253, 208)")
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
        $(".Book2").show(2000)
        $("html").css("background-color","rgb(173, 216, 230)")
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "rgb(255, 253, 208)");
        $("#Book3").show(2000)
        $("html").css("background-color","rgb(248, 131, 121)")         
      });

    </script>
  </body>
</html>
